<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>国税庁AIボット | 税務ハブ</title>
<style>
:root{
  --ink:#0a1628;
  --blue:#1565c0;
  --blue2:#1976d2;
  --blue-dim:#e3f2fd;
  --gold:#c9a84c;
  --bg:#f0f4fa;
  --card:#ffffff;
  --border:#dde4f0;
  --text2:#5a6880;
  --red:#c62828;
  --green:#2e7d32;
  --shadow:0 2px 12px rgba(21,101,192,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:'Helvetica Neue',sans-serif;min-height:100vh;display:flex;flex-direction:column}

/* ヘッダー */
.header{background:linear-gradient(135deg,var(--ink),#1a2a4a);padding:12px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;flex-shrink:0}
.back-btn{background:rgba(255,255,255,.1);border:none;color:#fff;width:32px;height:32px;border-radius:8px;font-size:16px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.header-icon{width:36px;height:36px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.header-title{font-size:15px;font-weight:800;color:#fff}
.header-sub{font-size:9px;color:rgba(255,255,255,.5);letter-spacing:.1em;margin-top:1px}
.online-dot{width:6px;height:6px;border-radius:50%;background:#69f0ae;margin-left:auto;flex-shrink:0;box-shadow:0 0 6px #69f0ae}

/* クイックタグ */
.tags-wrap{background:var(--card);border-bottom:1px solid var(--border);padding:10px 12px;flex-shrink:0}
.tags-label{font-size:9px;color:var(--text2);font-weight:700;letter-spacing:.1em;margin-bottom:7px}
.tags-row{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px}
.tags-row::-webkit-scrollbar{display:none}
.tag{flex-shrink:0;padding:6px 12px;background:var(--blue-dim);border:1px solid rgba(21,101,192,.2);border-radius:16px;font-size:11px;font-weight:700;color:var(--blue);cursor:pointer;white-space:nowrap}
.tag:active{background:#bbdefb}

/* チャットエリア */
.chat-area{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;-webkit-overflow-scrolling:touch}

/* メッセージ */
.msg{display:flex;gap:8px;align-items:flex-end}
.msg.user{flex-direction:row-reverse}
.msg-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.msg-avatar.bot{background:linear-gradient(135deg,var(--blue),#0d47a1)}
.msg-avatar.user{background:linear-gradient(135deg,#546e7a,#37474f)}
.msg-bubble{max-width:85%;padding:10px 14px;border-radius:16px;font-size:12px;line-height:1.7;word-break:break-word}
.msg.bot .msg-bubble{background:var(--card);border:1px solid var(--border);border-bottom-left-radius:4px;box-shadow:var(--shadow)}
.msg.user .msg-bubble{background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;border-bottom-right-radius:4px}
.msg-time{font-size:9px;color:var(--text2);margin-top:3px;text-align:right}
.msg.bot .msg-time{text-align:left}

/* 情報カード（回答内に埋め込み） */
.info-card{background:var(--blue-dim);border:1px solid rgba(21,101,192,.2);border-radius:10px;padding:10px 12px;margin-top:8px;font-size:11px}
.info-card-title{font-weight:700;color:var(--blue);margin-bottom:4px;font-size:11px}
.source-link{display:inline-block;margin-top:6px;font-size:10px;color:var(--blue);font-weight:700;text-decoration:none}

/* タイピング */
.typing{display:flex;gap:4px;padding:12px 16px;background:var(--card);border-radius:16px;border:1px solid var(--border);width:fit-content}
.typing span{width:6px;height:6px;background:var(--blue);border-radius:50%;animation:bounce .8s infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

/* 入力エリア */
.input-area{background:var(--card);border-top:1px solid var(--border);padding:10px 12px;flex-shrink:0}
.input-row{display:flex;gap:8px;align-items:flex-end}
.input-box{flex:1;background:var(--bg);border:1.5px solid var(--border);border-radius:20px;padding:10px 14px;font-size:13px;font-family:inherit;resize:none;outline:none;min-height:42px;max-height:120px;line-height:1.4;transition:border .15s}
.input-box:focus{border-color:var(--blue)}
.send-btn{width:42px;height:42px;background:linear-gradient(135deg,var(--blue),var(--blue2));border:none;border-radius:50%;color:#fff;font-size:18px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(21,101,192,.3)}
.send-btn:disabled{background:#ccc;box-shadow:none}
.mic-btn{width:36px;height:36px;background:var(--blue-dim);border:1px solid rgba(21,101,192,.2);border-radius:50%;color:var(--blue);font-size:16px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}

/* トースト */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:8px 18px;border-radius:16px;font-size:11px;font-weight:700;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="header">
  <button class="back-btn" onclick="goHub()">⌂</button>
  <div class="header-icon">🏛️</div>
  <div>
    <div class="header-title">国税庁AIボット</div>
    <div class="header-sub">確定申告・インボイス・タックスアンサー完全対応</div>
  </div>
  <div class="online-dot"></div>
</div>

<!-- クイックタグ -->
<div class="tags-wrap">
  <div class="tags-label">よく聞かれる質問</div>
  <div class="tags-row" id="tagsRow"></div>
</div>

<!-- チャット -->
<div class="chat-area" id="chatArea"></div>

<!-- 入力 -->
<div class="input-area">
  <div class="input-row">
    <button class="mic-btn" onclick="startVoice()" id="micBtn">🎤</button>
    <textarea class="input-box" id="inputBox" placeholder="税務の質問を入力... 例：青色申告の控除額は？"
      rows="1" onkeydown="onKD(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMsg()">▶</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js';
import { getAuth, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js';
import { getFirestore, collection, addDoc, serverTimestamp }
  from 'https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyCVk2miG5TK1ffTofXLh0hHgeSbOvmIgZ8",
  authDomain: "kensetsu-nippo-842a2.firebaseapp.com",
  projectId: "kensetsu-nippo-842a2",
  storageBucket: "kensetsu-nippo-842a2.appspot.com",
  messagingSenderId: "1234567890",
  appId: "1:1234567890:web:abcdef"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
window.__fb = { auth, db, collection, addDoc, serverTimestamp };

onAuthStateChanged(auth, function(user) {
  if (!user) { window.location.href = 'index.html'; }
  else { window.__user = user; }
});
</script>

<script>
var FUNC_BASE = (location.hostname==='localhost'||location.hostname==='127.0.0.1')
  ? 'http://localhost:5001/kensetsu-nippo-842a2/us-central1'
  : 'https://us-central1-kensetsu-nippo-842a2.cloudfunctions.net';
var HH_KEY = 'HeartsHouse2026Key';

var _history = [];
var _sending = false;

// クイックタグ
var QUICK_TAGS = [
  '青色申告の控除額は？',
  '経費にできるものは？',
  'インボイス番号の確認方法',
  '確定申告の期限は？',
  '消費税の簡易課税とは？',
  '外注費と給与の違いは？',
  '減価償却の計算方法',
  '源泉徴収の仕組みは？',
  '建設業の必要経費は？',
  'e-Taxの使い方',
  '医療費控除の申請方法',
  '小規模企業共済とは？'
];

(function init() {
  var row = document.getElementById('tagsRow');
  QUICK_TAGS.forEach(function(t) {
    var btn = document.createElement('button');
    btn.className = 'tag';
    btn.textContent = t;
    btn.onclick = function() { sendQuick(t); };
    row.appendChild(btn);
  });

  // ウェルカムメッセージ
  addBotMsg([
    '🏛️ こんにちは！国税庁AIボットです。',
    '',
    '確定申告・消費税・インボイス・青色申告・e-Taxなど、税務に関することなら何でもお答えします。',
    '',
    '建設業・大工・個人事業主の方に特化した税務アドバイスが得意です。',
    '気軽に質問してください！'
  ].join('\n'));
})();

function goHub() {
  window.location.href = 'index.html';
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2500);
}

function nowTime() {
  var d = new Date();
  return ('0'+d.getHours()).slice(-2) + ':' + ('0'+d.getMinutes()).slice(-2);
}

function addBotMsg(text) {
  var area = document.getElementById('chatArea');
  var div = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = '<div class="msg-avatar bot">🏛️</div>'
    + '<div>'
    + '<div class="msg-bubble">' + text.split('\n').join('<br>') + '</div>'
    + '<div class="msg-time">' + nowTime() + '</div>'
    + '</div>';
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  return div;
}

function addUserMsg(text) {
  var area = document.getElementById('chatArea');
  var div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = '<div class="msg-avatar user">👤</div>'
    + '<div>'
    + '<div class="msg-bubble">' + text.replace(/</g,'&lt;').split('\n').join('<br>') + '</div>'
    + '<div class="msg-time">' + nowTime() + '</div>'
    + '</div>';
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function showTyping() {
  var area = document.getElementById('chatArea');
  var div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typing';
  div.innerHTML = '<div class="msg-avatar bot">🏛️</div>'
    + '<div class="typing"><span></span><span></span><span></span></div>';
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function hideTyping() {
  var t = document.getElementById('typing');
  if (t) t.remove();
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function onKD(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
}

function sendQuick(text) {
  document.getElementById('inputBox').value = text;
  sendMsg();
}

async function sendMsg() {
  if (_sending) return;
  var input = document.getElementById('inputBox');
  var text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  _sending = true;
  document.getElementById('sendBtn').disabled = true;

  addUserMsg(text);
  _history.push({ role: 'user', content: text });
  showTyping();

  var today = new Date();
  var todayStr = today.getFullYear() + '年' + (today.getMonth()+1) + '月' + today.getDate() + '日';

  var systemPrompt = [
    'あなたは国税庁・税務署の内容を完全に習得した日本最高の税務AIアドバイザーです。',
    '今日の日付: ' + todayStr,
    '',
    '【専門領域】',
    '・所得税・法人税・消費税・相続税・贈与税',
    '・建設業・大工・個人事業主の税務処理',
    '・インボイス制度・電子帳簿保存法',
    '・青色申告・白色申告・確定申告',
    '・e-Tax操作方法・タックスアンサー',
    '・外注費・人件費・材料費・工具費の経費処理',
    '',
    '【回答ルール】',
    '・必ず国税庁の根拠（タックスアンサーNo.）を明示する',
    '・金額計算は必ず具体的な数字で示す',
    '・建設業・個人事業主に特化した実践的なアドバイスをする',
    '・Google検索で最新情報を確認してから回答する',
    '・回答の最後に関連するタックスアンサーのNo.を記載する',
    '・難しい税務用語は必ずわかりやすく解説する',
    '・「税理士に相談を」は本当に複雑な場合のみ使用する',
  ].join('\n');

  try {
    var messages = _history.slice(-10).map(function(m) {
      return { role: m.role, content: m.content };
    });

    var r = await fetch(FUNC_BASE + '/askAI', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-access-key': HH_KEY },
      body: JSON.stringify({
        prompt: systemPrompt + '\n\n質問: ' + text,
        model: 'gemini-2.5-flash',
        mode: 'tax',
        useSearch: true,
        messages: messages
      })
    });

    var d = await r.json();
    var reply = d?.data?.text || d?.candidates?.[0]?.content?.parts?.[0]?.text || d?.text || 'エラーが発生しました';

    hideTyping();
    _history.push({ role: 'assistant', content: reply });

    // タックスアンサーNoを検出してカード表示
    var taxNoMatch = reply.match(/タックスアンサー[^\d]*(\d{4,5})/g);
    var displayText = reply;
    if (taxNoMatch && taxNoMatch.length > 0) {
      var nos = taxNoMatch.map(function(m) { return m.match(/\d{4,5}/)[0]; });
      var uniqueNos = nos.filter(function(v, i) { return nos.indexOf(v) === i; });
      var links = uniqueNos.map(function(no) {
        return '<a class="source-link" href="https://www.nta.go.jp/taxes/shiraberu/taxanswer/shotoku/No' + no + '.htm" target="_blank">📎 タックスアンサー No.' + no + '</a>';
      }).join(' ');
      displayText += '<div class="info-card"><div class="info-card-title">📚 参考：国税庁タックスアンサー</div>' + links + '</div>';
    }

    addBotMsg(displayText);

    // Firestoreに会話を保存
    try {
      var fb = window.__fb;
      if (fb && window.__user) {
        await fb.addDoc(fb.collection(fb.db, 'kokuzei_history'), {
          uid: window.__user.uid,
          question: text,
          answer: reply,
          createdAt: fb.serverTimestamp()
        });
      }
    } catch(e2) { /* 保存失敗は無視 */ }

  } catch(e) {
    hideTyping();
    addBotMsg('⚠️ エラーが発生しました: ' + e.message + '\n\nしばらくしてから再試行してください。');
  } finally {
    _sending = false;
    document.getElementById('sendBtn').disabled = false;
  }
}

// 音声入力
function startVoice() {
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
    showToast('音声入力はこのブラウザで非対応です');
    return;
  }
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  var rec = new SR();
  rec.lang = 'ja-JP';
  rec.onstart = function() {
    document.getElementById('micBtn').textContent = '🔴';
    showToast('🎤 話してください...');
  };
  rec.onresult = function(e) {
    document.getElementById('inputBox').value = e.results[0][0].transcript;
    document.getElementById('micBtn').textContent = '🎤';
  };
  rec.onerror = function() {
    document.getElementById('micBtn').textContent = '🎤';
    showToast('音声認識エラー');
  };
  rec.onend = function() {
    document.getElementById('micBtn').textContent = '🎤';
  };
  rec.start();
}
</script>
</body>
</html>
