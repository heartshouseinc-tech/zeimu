<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>節税・補助金AIボット | 税務ハブ</title>
<style>
:root{
  --ink:#0f1a0f;
  --green:#2e7d32;
  --green2:#388e3c;
  --green-dim:#e8f5e9;
  --gold:#c9a84c;
  --purple:#6a1b9a;
  --purple-dim:#f3e5f5;
  --red:#c62828;
  --blue:#1565c0;
  --blue-dim:#e3f2fd;
  --teal:#00695c;
  --teal-dim:#e0f2f1;
  --pink:#c62828;
  --pink-dim:#fce4ec;
  --bg:#f1f8f1;
  --card:#ffffff;
  --border:#d8ecd8;
  --text2:#5a7060;
  --shadow:0 2px 12px rgba(46,125,50,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:'Helvetica Neue',sans-serif;min-height:100vh;display:flex;flex-direction:column}

.header{background:linear-gradient(135deg,var(--ink),#1a2e1a);padding:12px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;flex-shrink:0}
.back-btn{background:rgba(255,255,255,.1);border:none;color:#fff;width:32px;height:32px;border-radius:8px;font-size:16px;cursor:pointer;flex-shrink:0}
.header-icon{width:36px;height:36px;background:var(--green);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.header-title{font-size:15px;font-weight:800;color:#fff}
.header-sub{font-size:9px;color:rgba(255,255,255,.5);letter-spacing:.1em;margin-top:1px}

/* タブ */
.tabs{display:flex;background:var(--card);border-bottom:2px solid var(--border);flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:10px 14px;font-size:11px;font-weight:700;border:none;background:none;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap}
.tab.active{color:var(--green);border-bottom-color:var(--green)}

/* パネル */
.panel{display:none;flex:1;flex-direction:column;overflow:hidden}
.panel.active{display:flex}

/* チャットエリア */
.chat-area{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;-webkit-overflow-scrolling:touch}
.msg{display:flex;gap:8px;align-items:flex-end}
.msg.user{flex-direction:row-reverse}
.msg-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.msg-avatar.bot{background:linear-gradient(135deg,var(--green),var(--green2))}
.msg-avatar.user{background:linear-gradient(135deg,#546e7a,#37474f)}
.msg-bubble{max-width:85%;padding:10px 14px;border-radius:16px;font-size:12px;line-height:1.7;word-break:break-word}
.msg.bot .msg-bubble{background:var(--card);border:1px solid var(--border);border-bottom-left-radius:4px;box-shadow:var(--shadow)}
.msg.user .msg-bubble{background:linear-gradient(135deg,var(--green),var(--green2));color:#fff;border-bottom-right-radius:4px}
.msg-time{font-size:9px;color:var(--text2);margin-top:3px}
.msg.user .msg-time{text-align:right}
.typing{display:flex;gap:4px;padding:12px 16px;background:var(--card);border-radius:16px;border:1px solid var(--border);width:fit-content}
.typing span{width:6px;height:6px;background:var(--green);border-radius:50%;animation:bounce .8s infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

/* 入力 */
.input-area{background:var(--card);border-top:1px solid var(--border);padding:10px 12px;flex-shrink:0}
.input-row{display:flex;gap:8px;align-items:flex-end}
.input-box{flex:1;background:var(--bg);border:1.5px solid var(--border);border-radius:20px;padding:10px 14px;font-size:13px;font-family:inherit;resize:none;outline:none;min-height:42px;max-height:120px;line-height:1.4;transition:border .15s}
.input-box:focus{border-color:var(--green)}
.send-btn{width:42px;height:42px;background:linear-gradient(135deg,var(--green),var(--green2));border:none;border-radius:50%;color:#fff;font-size:18px;cursor:pointer;flex-shrink:0;box-shadow:0 2px 8px rgba(46,125,50,.3)}
.send-btn:disabled{background:#ccc;box-shadow:none}
.mic-btn{width:36px;height:36px;background:var(--green-dim);border:1px solid rgba(46,125,50,.2);border-radius:50%;color:var(--green);font-size:16px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}

/* クイックタグ */
.tags-wrap{background:var(--card);border-bottom:1px solid var(--border);padding:8px 12px;flex-shrink:0}
.tags-label{font-size:9px;color:var(--text2);font-weight:700;letter-spacing:.1em;margin-bottom:5px}
.tags-row{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px}
.tags-row::-webkit-scrollbar{display:none}
.tag{flex-shrink:0;padding:5px 11px;border-radius:14px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid;white-space:nowrap}
.tag-green{background:var(--green-dim);color:var(--green);border-color:rgba(46,125,50,.25)}
.tag-purple{background:var(--purple-dim);color:var(--purple);border-color:rgba(106,27,154,.25)}
.tag-teal{background:var(--teal-dim);color:var(--teal);border-color:rgba(0,105,92,.25)}
.tag-pink{background:var(--pink-dim);color:var(--pink);border-color:rgba(198,40,40,.25)}
.tag-blue{background:var(--blue-dim);color:var(--blue);border-color:rgba(21,101,192,.25)}

/* シミュレーターパネル */
.sim-area{flex:1;overflow-y:auto;padding:12px}
.sim-card{background:var(--card);border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow);border:1px solid var(--border)}
.sim-title{font-size:13px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.sim-badge{font-size:9px;padding:2px 8px;border-radius:10px;font-weight:700}
.badge-green{background:var(--green-dim);color:var(--green)}
.badge-purple{background:var(--purple-dim);color:var(--purple)}
.badge-teal{background:var(--teal-dim);color:var(--teal)}
.badge-pink{background:var(--pink-dim);color:var(--pink)}
.form-row{margin-bottom:10px}
.form-label{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:4px;display:block}
.form-input{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;outline:none;transition:border .15s}
.form-input:focus{border-color:var(--green)}
.calc-btn{width:100%;padding:12px;background:linear-gradient(135deg,var(--green),var(--green2));color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;margin-top:4px}
.result-box{background:var(--green-dim);border:1px solid rgba(46,125,50,.2);border-radius:10px;padding:12px;margin-top:10px;display:none}
.result-title{font-size:11px;font-weight:700;color:var(--green);margin-bottom:8px}
.result-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-size:12px}
.result-val{font-weight:800;font-size:15px;color:var(--green)}
.result-sub{font-size:10px;color:var(--text2);margin-top:2px}
.result-box.purple{background:var(--purple-dim);border-color:rgba(106,27,154,.2)}
.result-box.purple .result-title{color:var(--purple)}
.result-box.purple .result-val{color:var(--purple)}
.result-box.teal{background:var(--teal-dim);border-color:rgba(0,105,92,.2)}
.result-box.teal .result-title{color:var(--teal)}
.result-box.teal .result-val{color:var(--teal)}
.result-box.pink{background:var(--pink-dim);border-color:rgba(198,40,40,.2)}
.result-box.pink .result-title{color:var(--pink)}
.result-box.pink .result-val{color:var(--pink)}

/* トースト */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:8px 18px;border-radius:16px;font-size:11px;font-weight:700;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="header">
  <button class="back-btn" onclick="goHub()">⌂</button>
  <div class="header-icon">💰</div>
  <div>
    <div class="header-title">節税・補助金AIボット</div>
    <div class="header-sub">NISA・iDeCo・ふるさと納税・補助金</div>
  </div>
</div>

<!-- タブ -->
<div class="tabs">
  <button class="tab active" onclick="switchTab('chat')" id="tab-chat">💬 AIチャット</button>
  <button class="tab" onclick="switchTab('sim')" id="tab-sim">🧮 シミュレーター</button>
  <button class="tab" onclick="switchTab('hojo')" id="tab-hojo">📋 補助金</button>
</div>

<!-- AIチャットパネル -->
<div class="panel active" id="panel-chat">
  <div class="tags-wrap">
    <div class="tags-label">カテゴリ別クイック質問</div>
    <div class="tags-row" id="tagsRow"></div>
  </div>
  <div class="chat-area" id="chatArea"></div>
  <div class="input-area">
    <div class="input-row">
      <button class="mic-btn" onclick="startVoice()" id="micBtn">🎤</button>
      <textarea class="input-box" id="inputBox" placeholder="節税・補助金・NISAなど何でも聞いてください"
        rows="1" onkeydown="onKD(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMsg()">▶</button>
    </div>
  </div>
</div>

<!-- シミュレーターパネル -->
<div class="panel" id="panel-sim">
  <div class="sim-area">

    <!-- ふるさと納税 -->
    <div class="sim-card">
      <div class="sim-title">🎁 ふるさと納税 控除上限額計算<span class="sim-badge badge-pink">人気</span></div>
      <div class="form-row">
        <label class="form-label">年収（万円）</label>
        <input class="form-input" type="number" id="ft-income" placeholder="例：500">
      </div>
      <div class="form-row">
        <label class="form-label">家族構成</label>
        <select class="form-input" id="ft-family">
          <option value="single">独身・共働き（配偶者控除なし）</option>
          <option value="spouse">配偶者あり（専業主婦/夫）</option>
          <option value="child1">配偶者＋子1人（16歳未満）</option>
          <option value="child2">配偶者＋子2人（16歳未満）</option>
          <option value="child_hs">配偶者＋高校生1人</option>
          <option value="child_uni">配偶者＋大学生1人</option>
        </select>
      </div>
      <button class="calc-btn" onclick="calcFurusato()">🧮 控除上限額を計算</button>
      <div class="result-box pink" id="ft-result">
        <div class="result-title">🎁 ふるさと納税 計算結果</div>
        <div class="result-row"><span>控除上限額</span><span class="result-val" id="ft-limit">-</span></div>
        <div class="result-row"><span>実質負担</span><span style="font-weight:700">2,000円</span></div>
        <div class="result-row"><span>お得な返礼品の目安</span><span class="result-val" id="ft-goods">-</span></div>
        <div class="result-sub" id="ft-note"></div>
      </div>
    </div>

    <!-- iDeCo -->
    <div class="sim-card">
      <div class="sim-title">🏦 iDeCo 節税効果計算<span class="sim-badge badge-teal">節税大</span></div>
      <div class="form-row">
        <label class="form-label">職業</label>
        <select class="form-input" id="id-type">
          <option value="jigyonushi">個人事業主・フリーランス</option>
          <option value="kaisha">会社員（企業年金なし）</option>
          <option value="kaisha2">会社員（企業年金あり）</option>
          <option value="shufu">専業主婦・夫</option>
        </select>
      </div>
      <div class="form-row">
        <label class="form-label">年収または課税所得（万円）</label>
        <input class="form-input" type="number" id="id-income" placeholder="例：500">
      </div>
      <div class="form-row">
        <label class="form-label">月額掛金（円）</label>
        <input class="form-input" type="number" id="id-monthly" placeholder="個人事業主は最大68,000円">
      </div>
      <button class="calc-btn" style="background:linear-gradient(135deg,var(--teal),#00796b)" onclick="calcIdeco()">🧮 節税効果を計算</button>
      <div class="result-box teal" id="id-result">
        <div class="result-title">🏦 iDeCo 計算結果</div>
        <div class="result-row"><span>年間掛金</span><span class="result-val" id="id-annual">-</span></div>
        <div class="result-row"><span>所得税節税額（概算）</span><span class="result-val" id="id-tax">-</span></div>
        <div class="result-row"><span>住民税節税額（概算）</span><span class="result-val" id="id-local">-</span></div>
        <div class="result-row"><span>年間合計節税額</span><span class="result-val" id="id-total">-</span></div>
        <div class="result-row"><span>月額掛金上限</span><span class="result-val" id="id-max">-</span></div>
        <div class="result-sub" id="id-note"></div>
      </div>
    </div>

    <!-- 新NISA -->
    <div class="sim-card">
      <div class="sim-title">📈 新NISA 運用シミュレーション<span class="sim-badge badge-purple">非課税</span></div>
      <div class="form-row">
        <label class="form-label">毎月積立額（円）</label>
        <input class="form-input" type="number" id="ns-monthly" placeholder="例：30000">
      </div>
      <div class="form-row">
        <label class="form-label">年間一括投資額（成長投資枠・円）</label>
        <input class="form-input" type="number" id="ns-lump" placeholder="最大2,400,000円">
      </div>
      <div class="form-row">
        <label class="form-label">想定利回り（%）</label>
        <select class="form-input" id="ns-rate">
          <option value="3">3%（保守的）</option>
          <option value="5" selected>5%（標準）</option>
          <option value="7">7%（積極的）</option>
        </select>
      </div>
      <div class="form-row">
        <label class="form-label">運用期間（年）</label>
        <input class="form-input" type="number" id="ns-years" placeholder="例：20">
      </div>
      <button class="calc-btn" style="background:linear-gradient(135deg,var(--purple),#7b1fa2)" onclick="calcNisa()">🧮 運用シミュレーション</button>
      <div class="result-box purple" id="ns-result">
        <div class="result-title">📈 新NISA 運用結果</div>
        <div class="result-row"><span>総投資額</span><span class="result-val" id="ns-invest">-</span></div>
        <div class="result-row"><span>運用益（非課税）</span><span class="result-val" id="ns-gain">-</span></div>
        <div class="result-row"><span>最終資産額</span><span class="result-val" id="ns-total">-</span></div>
        <div class="result-row"><span>通常課税なら税金</span><span style="font-weight:700;color:#c62828" id="ns-taxsaved">-</span></div>
        <div class="result-sub" id="ns-note"></div>
      </div>
    </div>

    <!-- 総合節税シミュレーション -->
    <div class="sim-card">
      <div class="sim-title">💰 総合節税シミュレーション<span class="sim-badge badge-green">おすすめ</span></div>
      <div class="form-row">
        <label class="form-label">年収（万円）</label>
        <input class="form-input" type="number" id="total-income" placeholder="例：600">
      </div>
      <div class="form-row">
        <label class="form-label">業種</label>
        <select class="form-input" id="total-type">
          <option value="kensetsu">建設業・大工（個人事業主）</option>
          <option value="service">サービス業（個人事業主）</option>
          <option value="company">中小企業経営者</option>
          <option value="employee">会社員</option>
        </select>
      </div>
      <button class="calc-btn" onclick="calcTotal()">🧮 最適な節税プランを計算</button>
      <div class="result-box" id="total-result">
        <div class="result-title">💰 あなたの節税プラン</div>
        <div id="total-content"></div>
      </div>
    </div>

  </div>
</div>

<!-- 補助金パネル -->
<div class="panel" id="panel-hojo">
  <div class="tags-wrap">
    <div class="tags-label">補助金カテゴリ</div>
    <div class="tags-row" id="hojoTags"></div>

  <div class="chat-area" id="hojoArea"></div>

  </div>
</div>

async function sendMsg() {
  if (_sending) return;
  var input = document.getElementById('inputBox');
  var text = input.value.trim();
  if (!text) return;
  input.value = ''; input.style.height = 'auto';
  _sending = true;
  document.getElementById('sendBtn').disabled = true;
  addUserMsg('chatArea', text);
  _history.push({role:'user', content:text});
  showTyping('chatArea');
  try {
    var r = await fetch(FUNC_BASE + '/askAI', {
      method:'POST',
      headers:{'Content-Type':'application/json','x-access-key':HH_KEY},
      body: JSON.stringify({
        prompt: SYS_SETSUZEI + '\n\n質問: ' + text,
        model: 'gemini-2.5-flash',
        mode: 'tax',
        useSearch: true,
        messages: _history.slice(-10)
      })
    });
    var d = await r.json();
    var reply = d?.data?.text || d?.candidates?.[0]?.content?.parts?.[0]?.text || d?.text || 'エラーが発生しました';
    hideTyping('chatArea');
    _history.push({role:'assistant', content:reply});
    addBotMsg('chatArea', reply);
  } catch(e) {
    hideTyping('chatArea');
    addBotMsg('chatArea', 'エラー: ' + e.message);
  } finally {
    _sending = false;
    document.getElementById('sendBtn').disabled = false;
  }
}

// ===== iDeCo計算 =====
function calcIdeco() {
  var type = document.getElementById('id-type').value;
  var income = parseInt(document.getElementById('id-income').value) || 0;
  var monthly = parseInt(document.getElementById('id-monthly').value) || 0;
  var maxMap = {jigyonushi:68000, kaisha:23000, kaisha2:12000, shufu:23000};
  var maxMonthly = maxMap[type] || 68000;
  if (monthly > maxMonthly) { monthly = maxMonthly; showToast('月額上限は' + maxMonthly.toLocaleString() + '円です'); }
  if (income <= 0 || monthly <= 0) { showToast('年収と月額掛金を入力してください'); return; }
  var annual = monthly * 12;
  var taxRate = 0;
  if (income < 195) taxRate = 0.05;
  else if (income < 330) taxRate = 0.10;
  else if (income < 695) taxRate = 0.20;
  else if (income < 900) taxRate = 0.23;
  else if (income < 1800) taxRate = 0.33;
  else if (income < 4000) taxRate = 0.40;
  else taxRate = 0.45;
  var incomeTax = Math.round(annual * taxRate);
  var localTax = Math.round(annual * 0.10);
  var total = incomeTax + localTax;
  document.getElementById('id-annual').textContent = annual.toLocaleString() + '円';
  document.getElementById('id-tax').textContent = incomeTax.toLocaleString() + '円';
  document.getElementById('id-local').textContent = localTax.toLocaleString() + '円';
  document.getElementById('id-total').textContent = total.toLocaleString() + '円';
  document.getElementById('id-max').textContent = maxMonthly.toLocaleString() + '円/月';
  document.getElementById('id-note').textContent = '※受取時は退職所得控除または公的年金等控除が適用';
  document.getElementById('id-result').style.display = 'block';
}

// ===== 新NISA計算 =====
function calcNisa() {
  var monthly = parseInt(document.getElementById('ns-monthly').value) || 0;
  var lump = parseInt(document.getElementById('ns-lump').value) || 0;
  var rate = parseFloat(document.getElementById('ns-rate').value) / 100;
  var years = parseInt(document.getElementById('ns-years').value) || 0;
  if (years <= 0) { showToast('運用期間を入力してください'); return; }
  var totalMonthly = 0, totalLump = 0;
  var r = rate / 12;
  if (monthly > 0) {
    totalMonthly = monthly * ((Math.pow(1+r, years*12) - 1) / r) * (1+r);
  }
  if (lump > 0) {
    totalLump = lump * (Math.pow(1+rate, years) - 1) / rate * (1 + rate);
  }
  var totalAsset = Math.round(totalMonthly + totalLump);
  var totalInvest = monthly * 12 * years + lump * years;
  var gain = totalAsset - totalInvest;
  var taxSaved = Math.round(gain * 0.20315);
  function fmt(n) {
    if (n >= 100000000) return (Math.round(n/10000000)/10).toFixed(1) + '億円';
    if (n >= 10000) return Math.round(n/10000) + '万円';
    return n.toLocaleString() + '円';
  }
  document.getElementById('ns-invest').textContent = fmt(totalInvest);
  document.getElementById('ns-gain').textContent = fmt(gain);
  document.getElementById('ns-total').textContent = fmt(totalAsset);
  document.getElementById('ns-taxsaved').textContent = fmt(taxSaved) + 'が非課税！';
  document.getElementById('ns-note').textContent = '年間投資上限: つみたて枠120万円・成長枠240万円・生涯1,800万円';
  document.getElementById('ns-result').style.display = 'block';
}

// ===== 総合節税計算 =====
function calcTotal() {
  var income = parseInt(document.getElementById('total-income').value) || 0;
  var type = document.getElementById('total-type').value;
  if (income <= 0) { showToast('年収を入力してください'); return; }
  var taxRate = 0;
  if (income < 195) taxRate = 0.15;
  else if (income < 330) taxRate = 0.20;
  else if (income < 695) taxRate = 0.30;
  else if (income < 900) taxRate = 0.33;
  else if (income < 1800) taxRate = 0.43;
  else taxRate = 0.50;
  var items = [];
  var isJigyonushi = type === 'kensetsu' || type === 'service';
  if (isJigyonushi) {
    items.push({name:'iDeCo（月68,000円）', deduction:816000, saving: Math.round(816000*taxRate), color:'teal'});
    items.push({name:'小規模企業共済（月70,000円）', deduction:840000, saving: Math.round(840000*taxRate), color:'green'});
    items.push({name:'経営セーフティ共済（月200,000円）', deduction:2400000, saving: Math.round(2400000*taxRate), color:'green'});
    items.push({name:'青色申告特別控除', deduction:650000, saving: Math.round(650000*taxRate), color:'blue'});
  } else {
    items.push({name:'iDeCo（月23,000円）', deduction:276000, saving: Math.round(276000*taxRate), color:'teal'});
  }
  var ftLimit = 0;
  var ftTable = [[300,30000],[400,42000],[500,61000],[600,77000],[800,108000],[1000,129000],[1500,176000],[2000,235000],[9999,330000]];
  for (var i=0;i<ftTable.length;i++) { if(income<=ftTable[i][0]){ftLimit=ftTable[i][1];break;} }
  if (!ftLimit) ftLimit = ftTable[ftTable.length-1][1];
  items.push({name:'ふるさと納税（控除上限'+ftLimit.toLocaleString()+'円）', deduction:ftLimit-2000, saving:ftLimit-2000, color:'pink'});
  var totalDeduction = items.reduce(function(s,i){return s+i.deduction;},0);
  var totalSaving = items.reduce(function(s,i){return s+i.saving;},0);
  var colorMap = {green:'var(--green)',teal:'var(--teal)',blue:'var(--blue)',pink:'var(--pink)'};
  var html = items.map(function(item) {
    return '<div class="result-row"><span>' + item.name + '</span>'
      + '<span style="font-weight:800;color:' + (colorMap[item.color]||'var(--green)') + '">'
      + item.saving.toLocaleString() + '円節税</span></div>';
  }).join('');
  html += '<div style="border-top:1px solid var(--border);margin-top:8px;padding-top:8px">'
    + '<div class="result-row"><span style="font-weight:700">合計節税効果</span>'
    + '<span class="result-val">' + totalSaving.toLocaleString() + '円/年</span></div>'
    + '<div class="result-sub">所得控除合計: ' + totalDeduction.toLocaleString() + '円'
    + '<br>※概算値。実際の税額は確定申告で確定します</div></div>';
  document.getElementById('total-content').innerHTML = html;
  document.getElementById('total-result').style.display = 'block';
}
